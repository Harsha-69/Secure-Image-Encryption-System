<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,
				initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            --background-color1: #627575;
            --background-color2: #b8c541;
            --background-color3: #c95555;
            --background-color4: #2d3a5fa4;
            --primary-color: #4b49ac;
            --secondary-color: #0c007d;
            --Border-color: #3f0097;
            --one-use-color: #3f0097;
            --two-use-color: #5500cb;
        }

        body {
            background-color: var(--background-color4);
            max-width: 100%;
            overflow-x: hidden;
        }

        header {
            height: 70px;
            width: 100vw;
            padding: 0 30px;
            background-color: var(--background-color1);
            position: fixed;
            z-index: 100;
            box-shadow: 1px 1px 15px rgba(161, 182, 253, 0.825);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 27px;
            font-weight: 600;
            color: rgb(228, 139, 5);
        }



        .main-container {
            display: flex;
            width: 100vw;
            position: relative;
            top: 4px;
            z-index: 1;
        }

        .dpicn {
            height: 42px;
        }

        .main {
            height: calc(100vh - 70px);
            width: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            padding: 40px 30px 30px 30px;
        }

        .main::-webkit-scrollbar-thumb {
            background-image:
                linear-gradient(to bottom, rgb(0, 0, 85), rgb(0, 0, 50));
        }

        .main::-webkit-scrollbar {
            width: 5px;
        }

        .main::-webkit-scrollbar-track {
            background-color: #9e9e9eb2;
        }

        .box-container {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            gap: 50px;
        }


        .option1 {
            border-left: 5px solid #010058af;
            background-color: var(--Border-color);
            color: white;
            cursor: pointer;
        }

        .option1:hover {
            border-left: 5px solid #010058af;
            background-color: var(--Border-color);
        }

        .box {
            height: 130px;
            width: 230px;
            border-radius: 20px;
            box-shadow: 3px 3px 10px rgba(0, 30, 87, 0.751);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .box:hover {
            transform: scale(1.08);
        }

        .box:nth-child(1) {
            background-color: var(--one-use-color);
        }

        .box:nth-child(2) {
            background-color: var(--two-use-color);
        }

        .box:nth-child(3) {
            background-color: var(--one-use-color);
        }

        .box:nth-child(4) {
            background-color: var(--two-use-color);
        }

        .box img {
            height: 50px;
        }

        .box .text {
            color: white;
        }

        .topic {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .topic-heading {
            font-size: 30px;
            letter-spacing: 3px;
        }

        .report-container {
            min-height: 500px;
            max-width: 1100px;
            margin: 70px auto 0px auto;
            background-color: #ffffff;
            border-radius: 30px;
            box-shadow: 3px 3px 10px rgb(188, 188, 188);
            padding: 0px 20px 20px 20px;
        }

        .report-header {
            height: 80px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 10px 20px;
            border-bottom: 2px solid rgba(0, 20, 151, 0.59);
        }

        .recent-Articles {
            font-size: 30px;
            font-weight: 600;
            color: #5500cb;
        }

        .view {
            height: 35px;
            width: 90px;
            border-radius: 8px;
            background-color: #5500cb;
            color: white;
            font-size: 15px;
            border: none;
            cursor: pointer;
        }

        .report-body {
            max-width: 1160px;
            overflow-x: auto;
            padding: 20px;
        }

        .report-topic-heading,
        .item1 {
            width: 1120px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .t-op {
            font-size: 18px;
            letter-spacing: 0px;
        }

        .items {
            width: 1120px;
            margin-top: 15px;
        }

        .item1 {
            margin-top: 20px;
        }

        .t-op-nextlvl {
            font-size: 14px;
            letter-spacing: 0px;
            font-weight: 600;
        }

        .lavel-tag {
            width: 100px;
            text-align: center;
            background-color: rgb(0, 177, 0);
            color: white;
            border-radius: 4px;
        }

        h3 {
            color: rgb(244, 85, 6);
        }

        a {
            text-decoration: none;
        }

        .img1 {
            height: 240px;
            width: 100%;
            border-radius: 50px;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn {
            border: 2px solid gray;
            color: gray;
            background-color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
        }

        .im_preview {
            max-width: 500px;
            max-height: 500px;
            border-radius: 10px;

            display: block;
            margin-left: auto;
            margin-right: auto;
            /* width: 40%; */
        }
        .view_d {
            height: 35px;
            width: 90px;
            border-radius: 8px;
            background-color: #bab1c7;
            color: white;
            font-size: 15px;
            border: none;
            cursor: pointer;
        }



    </style>
</head>

<body>

    <!-- for header part -->
    <header>

        <div class="logosec">
            <div class="logo"> Image Encryption & Decryption</Title>
            </div>

        </div>


    </header>

    <div class="main-container">

        <div class="main">


            <div class="report-container">
                <div class="report-header">
                    <button id="en" class="view_d" onclick="encode()" disabled>Encrypt</button>
                    <button id="dec" class="view_d" onclick="decode()" disabled>Decrypt</button>
                </div>

                <div class="report-body">
                    <div class="upload-btn-wrapper">
                        <button class="btn">Upload a Image</button>
                        <form action="/form" method="post" id="form_img">
                        <input type="file" id="file-ip-1" accept="image/*" onchange="showPreview(event);">
                    </form>
                    </div>

                    <div class="preview">
                        <img class="im_preview" id="file-ip-1-preview">
                    </div>

                </div>
            </div>


        </div>
    </div>
    <script type="text/javascript">
        function showPreview(event) {
            document.getElementById("en").disabled = false;
            document.getElementById("en").style = "background-color: #5500cb;";
            if (event.target.files.length > 0) {
                var src = URL.createObjectURL(event.target.files[0]);
                var preview = document.getElementById("file-ip-1-preview");
                preview.src = src;
                preview.style.display = "block";
            }
        }
        function decode(){
            document.getElementById("dec").disabled = true;
            document.getElementById("dec").style = "background-color: #bab1c7;";
            document.getElementById("file-ip-1-preview").src="{{ url_for('static', filename = 'images/loading.gif') }}";
            
            setTimeout(() => {    fetch("/",
                {
                method: "POST",
                body: "OK"
                })
            .then(function(res){ return res.json(); })
            .then(function(data){ 
                var im_path = data
                
                im_path = im_path["data"]
                console.log(im_path)
                
                document.getElementById("file-ip-1-preview").src=im_path;
            })
        }
        ,3000);
    }



        function encode(){
            document.getElementById("file-ip-1-preview").src="{{ url_for('static', filename = 'images/f.gif') }}";
         
            setTimeout(() => {

          document.getElementById("en").disabled = true;
          document.getElementById("en").style = "background-color: #bab1c7;";
          document.getElementById("dec").disabled = false;
          document.getElementById("dec").style = "background-color: #5500cb;";
          document.getElementById("file-ip-1-preview").src="{{ url_for('static', filename = 'images/lockB.png') }}";
          let formData = new FormData();
          formData.append("image", document.querySelector("input[type='file']").files[0]);
          console.log(document.querySelector("input[type='file']").files);
            let xhr = new XMLHttpRequest();
  xhr.open("POST", "/form", true);
  
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      console.log(xhr.responseText);
    }
  };
  
  xhr.send(formData);
        },3000)
        }
    </script>
